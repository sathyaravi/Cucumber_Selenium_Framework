name: Cucumber Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4        # Updated to v4 (recommended)

      - name: Set up Java 17
        uses: actions/setup-java@v4     # Updated to v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4          # Updated to v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run Maven Tests
       run: mvn clean test --no-transfer-progress

      - name: Debug - List All Files in target
        if: always()
        run: |
          echo "=== Target Directory Contents ==="
          ls -la target/
          echo "=== cucumber-reports ==="
          ls -la target/cucumber-reports/ 2>/dev/null || echo "Folder not found"
          echo "=== Looking for any .html files ==="
          find target -name "*.html" | head -10

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports
          path: target/
          retention-days: 7
