name: Cucumber Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Chrome & ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Run Maven Tests
        run: mvn clean test --no-transfer-progress

      - name: Debug - Show Target Contents
        if: always()
        run: |
          ls -la target/
          ls -la target/cucumber-reports/ 2>/dev/null || echo "cucumber-reports not found"
          ls -la target/surefire-reports/ 2>/dev/null || echo "surefire-reports not found"

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-test-reports
          path: |
            target/cucumber-reports/
            target/surefire-reports/
          retention-days: 7
